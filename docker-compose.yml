version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: TicketingDB
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    # Le decimos a Docker que verifique cada 5 segundos si PostgreSQL ya está listo
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Sobreescribimos la conexión para que apunte al servicio 'db' en la red de docker
      - ConnectionStrings__DefaultConnection=Host=db;Database=TicketingDB;Username=postgres;Password=admin
    # Cambiamos el depends_on para que no arranque hasta que la BD pase el chequeo de salud
    depends_on:
      db:
        condition: service_healthy
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ticketpro.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
