<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ticketing System Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header
        style="padding: 1.5rem 2rem; background: rgba(13, 15, 18, 0.8); border-bottom: 1px solid var(--card-border);">
        <div class="logo" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-color);">TicketPro</div>
    </header>

    <main class="container">
        <section id="events-section">
            <h1 class="section-title">Próximos Eventos</h1>
            <div id="events-container" class="events-grid">
                <!-- Las tarjetas se inyectarán aquí vía JS -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
