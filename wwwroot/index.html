<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
    <header class="main-header">
        <div class="logo">TicketPro</div>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span style="font-weight: 600;">Usuario</span>
            <button id="cart-toggle-btn" class="cart-toggle-btn" onclick="toggleCart()">
                🛒 Carrito <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main class="container">
        <section id="events-section">
            <h1 class="section-title">Próximos Eventos</h1>
            <div id="events-container" class="events-grid">
            </div>
        </section>

        <section id="seat-map-section" class="hidden">
            <button id="back-btn" class="btn-secondary">← Volver</button>
            <h2 id="event-title">Cargando...</h2>

            <div class="seat-legend">
                <div class="legend-item"><span class="legend-dot available">■</span> Disponible</div>
                <div class="legend-item"><span class="legend-dot reserved">■</span> Reservada</div>
                <div class="legend-item"><span class="legend-dot sold">■</span> Vendida</div>
            </div>

            <div id="seat-grid-container"></div>
        </section>
    </main>

    <!-- Cart Drawer -->
    <aside id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h2>Tus Reservas</h2>
            <button class="close-cart-btn" onclick="closeCart()">×</button>
        </div>
        <div class="cart-items-container">
            <h3 style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase;">Activas</h3>
            <div id="cart-items" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
                <!-- Items se inyectarán aquí -->
            </div>
            
            <h3 style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase;">Expiradas</h3>
            <div id="cart-items-expired" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Items expirados se moverán aquí -->
            </div>
        </div>
        <div class="cart-footer">
            <button class="checkout-btn" onclick="payAll()">Pagar Todo</button>
        </div>
    </aside>

    <script src="app.js?v=3"></script>
</body>

</html>
