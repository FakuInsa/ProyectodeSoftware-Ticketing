<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
</head>

<body>
    <header class="main-header">
        <div class="logo">TicketPro</div>
        <div id="user-section" class="header-actions hidden">
            <div class="user-dropdown">
                <span id="user-name-display" class="user-name">Usuario</span>
                <div class="dropdown-content">
                    <button id="btn-salir" class="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
            <button id="cart-toggle-btn" class="cart-toggle-btn">Carrito <span id="cart-count">0</span></button>
        </div>
    </header>

    <main class="container">
        <section id="events-section">
            <h1 class="section-title">Próximos Eventos</h1>
            <div id="events-container" class="events-grid"></div>
        </section>

        <section id="seat-map-section" class="hidden">
            <div class="seat-map-header">
                <div class="seat-map-actions">
                    <button id="back-btn" class="btn-secondary">&larr; Volver</button>
                    <button id="cancel-operation-btn" class="btn-secondaryb">Cancelar</button>
                </div>
                <div class="global-timer-container hidden" id="global-timer-container">
                    Tiempo restante: <span id="global-timer" class="global-timer-text">00:00</span>
                </div>
            </div>

            <h2 id="event-title">Cargando...</h2>

            <div class="seat-legend">
                <div class="legend-item"><span class="legend-dot available"></span> Disponible</div>
                <div class="legend-item"><span class="legend-dot reserved"></span> Reservada</div>
                <div class="legend-item"><span class="legend-dot sold"></span> Vendida</div>
            </div>

            <div id="seat-grid-container"></div>
        </section>
    </main>

    <aside id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h2>Tus Reservas</h2>
            <button id="close-cart-btn" class="close-cart-btn">&times;</button>
        </div>
        <div class="cart-items-container">
            <h3 class="cart-section-label">Activas</h3>
            <div id="cart-items" class="cart-items-list"></div>

            <h3 class="cart-section-label">Expiradas</h3>
            <div id="cart-items-expired" class="cart-items-list"></div>
        </div>
        <div class="cart-footer">
            <button id="pay-all-btn" class="checkout-btn">Pagar Todo</button>
        </div>
    </aside>

    <div id="qty-modal" class="modal-overlay hidden">
        <div class="modal-content qty-modal-content">
            <button id="close-qty-btn" class="close-btn">&times;</button>
            <h2 class="modal-title">¿Cuántas entradas?</h2>
            <p class="modal-subtitle">Seleccioná la cantidad de butacas a reservar.</p>
            <div class="auth-form">
                <input type="number" id="ticket-qty-input" min="1" max="10" value="1" class="qty-input">
                <button id="confirm-qty-btn" class="submit-btn">Comenzar Sesión de Compra</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="modal-title">Bienvenido a TicketPro</h2>
            <div class="modal-tabs">
                <button id="tab-login" class="tab-btn active">Ingresar</button>
                <button id="tab-register" class="tab-btn">Registrarse</button>
            </div>
            <div id="form-login" class="auth-form">
                <input type="email" id="auth-email-login" placeholder="Correo electrónico">
                <input type="password" id="auth-password-login" placeholder="Contraseña">
                <button id="btn-submit-login" class="submit-btn">Iniciar Sesión</button>
            </div>
            <div id="form-register" class="auth-form hidden">
                <input type="text" id="auth-nombre-reg" placeholder="Nombre">
                <input type="email" id="auth-email-reg" placeholder="Correo electrónico">
                <input type="password" id="auth-password-reg" placeholder="Crea una contraseña">
                <button id="btn-submit-register" class="submit-btn">Crear cuenta</button>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-payment-btn" class="close-btn">&times;</button>
            <h2 class="modal-title">Pago</h2>
            <p class="modal-subtitle">Ingresá los datos de tu tarjeta.</p>
            <div id="payment-form" class="auth-form">
                <input type="text" id="card-number" placeholder="Número de Tarjeta (16 dígitos)" maxlength="16">
                <div class="payment-row">
                    <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5">
                    <input type="text" id="card-cvv" placeholder="CVV" maxlength="3">
                </div>
                <button id="btn-confirm-payment" class="submit-btn">Pagar Ahora</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="app.js?v=6"></script>
</body>

</html>
