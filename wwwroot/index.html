<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
    <header class="main-header">
        <div class="logo">TicketPro</div>

        <div id="user-section" class="header-actions" style="display: none; align-items: center; gap: 15px;">
            <span id="user-name-display" style="font-weight: 600;">Usuario</span>
            <button id="cart-toggle-btn" class="cart-toggle-btn">🛒 Carrito <span id="cart-count">0</span></button>
            <button id="btn-salir"
                style="padding: 5px 10px; background: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer;">Salir</button>
        </div>
    </header>

    <main class="container">
        <section id="events-section">
            <h1 class="section-title">Próximos Eventos</h1>
            <div id="events-container" class="events-grid">
            </div>
        </section>

        <section id="seat-map-section" class="hidden">
            <button id="back-btn" class="btn-secondary">← Volver</button>
            <button id="cancel-operation-btn" class="btn-secondaryb">Cancelar</button>
            <h2 id="event-title">Cargando...</h2>

            <div class="seat-legend">
                <div class="legend-item"><span class="legend-dot available">■</span> Disponible</div>
                <div class="legend-item"><span class="legend-dot reserved">■</span> Reservada</div>
                <div class="legend-item"><span class="legend-dot sold">■</span> Vendida</div>
            </div>

            <div id="seat-grid-container"></div>
        </section>
    </main>

    <!-- Cart Drawer -->
    <aside id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h2>Tus Reservas</h2>
            <button id="close-cart-btn" class="close-cart-btn">×</button>
        </div>
        <div class="cart-items-container">
            <!-- PROPUESTO -->
            <h3 class="cart-section-label">Activas</h3>
            <div id="cart-items" class="cart-items-list">
                <!-- Items se inyectarán aquí -->
            </div>

            <h3 class="cart-section-label">Expiradas</h3>
            <div id="cart-items-expired" class="cart-items-list">

                <!-- Items expirados se moverán aquí -->
            </div>
        </div>
        <div class="cart-footer">
            <button id="pay-all-btn" class="checkout-btn">Pagar Todo</button>
        </div>
    </aside>

    <div id="qty-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 300px; text-align: center;">
            <button id="close-qty-btn" class="close-btn">×</button>
            <h2 style="margin-top: 0; color: #fff;">¿Cuántas entradas?</h2>
            <p style="color: #888; margin-bottom: 20px;">Seleccioná la cantidad de butacas que vas a reservar.</p>

            <div class="auth-form">
                <input type="number" id="ticket-qty-input" min="1" max="10" value="1"
                    style="text-align: center; font-size: 1.2rem;">
                <button id="confirm-qty-btn" class="submit-btn">Continuar al Mapa</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 style="text-align: center; margin-top: 0; margin-bottom: 1.5rem; color: #fff;">Bienvenido a TicketPro
            </h2>

            <div class="modal-tabs">
                <button id="tab-login" class="tab-btn active" onclick="switchAuthTab('login')">Ingresar</button>
                <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">Registrarse</button>
            </div>

            <div id="form-login" class="auth-form">
                <input type="email" id="auth-email-login" placeholder="Correo electrónico">
                <input type="password" id="auth-password-login" placeholder="Contraseña">
                <button class="submit-btn" onclick="submitAuth('login')">Iniciar Sesión</button>
            </div>

            <div id="form-register" class="auth-form" style="display: none;">
                <input type="text" id="auth-nombre-reg" placeholder="Tu Nombre y Apellido">
                <input type="email" id="auth-email-reg" placeholder="Correo electrónico">
                <input type="password" id="auth-password-reg" placeholder="Crea una contraseña">
                <button class="submit-btn" onclick="submitAuth('register')">Crear cuenta</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js?v=3"></script>
</body>

</html>
